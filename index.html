                    <option value="XOF">XOF — CFA Franc BCEAO</option>
                    <option value="XPF">XPF — CFP Franc</option>
                    <option value="YER">YER — Yemeni Rial</option>
                    <option value="ZAR">ZAR — South African Rand</option>
                    <option value="ZMK">ZMK — Zambian Kwacha (pre-2013)</option>
                    <option value="ZMW">ZMW — Zambian Kwacha</option>
                    <option value="ZWL">ZWL — Zimbabwean Dollar</option>
                </select>
            </div>

            <div>
                <label for="amount"
                    class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">AMOUNT</label>
                <input id="amount" type="number" placeholder="0.00" min="0" step="0.01" name="amount" required
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white transition-colors duration-200">
            </div>

            <div id="result" class="text-center text-lg font-semibold text-gray-800 dark:text-gray-100 mt-4">
            </div>

            <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition-colors duration-200 font-medium">
                Convert
            </button>
        </form>
    </div>
